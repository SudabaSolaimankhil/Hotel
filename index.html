<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <!-- ================= CONTACT ================= -->
<section class="section-pad" id="contact" style="padding-top:2rem;">
 <div class="container">
 <div class="text-center mb-5 reveal">
 <div class="eyebrow">Contact</div>
 <h2 class="section-title">Plan Your Stay</h2>
 <div class="rule-gold center"></div>
 </div>
 <div class="row g-5">
 <div class="col-lg-5 reveal">
 <div class="contact-info-item">
 <i class="bi bi-geo-alt"></i>
 <div><h6>Address</h6><p>19 Harbor Promenade, Waterside District</p></div>
 </div>
 <div class="contact-info-item">
 <i class="bi bi-telephone"></i>
 <div><h6>Reservations</h6><p>+1 (555) 214-9080</p></div>
 </div>
 <div class="contact-info-item">
 <i class="bi bi-envelope"></i>
 <div><h6>Email</h6><p>stay@ariahotel.com</p></div>
 </div>
 <div class="contact-info-item">
 <i class="bi bi-clock"></i>
 <div><h6>Front Desk</h6><p>Open 24 hours, every day</p></div>
 </div>
 <div class="map-frame mt-4">
 <iframe src="https://maps.google.com/maps?q=harbor%20waterfront&t=&z=13&ie=UTF8&iwloc=&output=embed" width="100%" height="220" style="border:0;" loading="lazy"></iframe>
 </div>
 </div>
 <div class="col-lg-7 reveal reveal-delay-1">
 <form>
 <div class="row g-4">
 <div class="col-md-6">
 <div class="field">
 <input type="text" placeholder=" " required>
 <label>Full Name</label>
 </div>
 </div>
 <div class="col-md-6">
 <div class="field">
 <input type="text" placeholder=" " required>
 <label>Phone Number</label>
 </div>
 </div>
 <div class="col-md-6">
 <div class="field">
 <input type="date" placeholder=" ">
 <label>Check-in</label>
 </div>
 </div>
 <div class="col-md-6">
 <div class="field">
 <input type="date" placeholder=" ">
 <label>Check-out</label>
 </div>
 </div>
 <div class="col-12">
 <div class="field">
 <textarea rows="4" placeholder=" "></textarea>
 <label>Your Message</label>
 </div>
 </div>
 <div class="col-12">
 <button type="submit" class="btn btn-aria-gold px-5">Send Reservation Request</button>
 </div>
 </div>
 </form>
 </div>
 </div>
 </div>
</section>
  </body>
</html>
